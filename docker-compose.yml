services:
  app:
    build:
      context: .
      network: host
      args:
        - HTTP_PROXY=${HTTP_PROXY:-}
        - HTTPS_PROXY=${HTTPS_PROXY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    container_name: novel-ai-writer
    ports:
      - "${APP_PORT:-3002}:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
      - DB_DIR=/app/data
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      - novel-ai-data:/app/data
      - novel-ai-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/api/settings"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  novel-ai-data:
  novel-ai-logs:
